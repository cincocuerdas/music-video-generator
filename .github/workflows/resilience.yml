name: Redis Resilience

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'prisma/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/resilience.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'prisma/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/resilience.yml'

jobs:
  redis-resilience:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run resilience test
        run: npm run test:resilience

      - name: Upload resilience logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resilience-logs
          path: storage/tmp-tests/*
          if-no-files-found: ignore

      - name: Cleanup containers
        if: always()
        run: docker compose down -v

  throttling-abuse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run throttling abuse test
        run: npm run test:throttling

      - name: Upload throttling logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: throttling-logs
          path: storage/tmp-tests/*
          if-no-files-found: ignore

      - name: Cleanup containers
        if: always()
        run: docker compose down -v
