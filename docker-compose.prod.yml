services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: musicvideo-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-musicvideo}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net_prod

  redis:
    image: redis:7-alpine
    container_name: musicvideo-redis-prod
    command: >
      sh -c 'if [ -z "$$REDIS_PASSWORD" ]; then
        echo "ERROR: REDIS_PASSWORD is required in production";
        exit 1;
      fi;
      exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net_prod

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicvideo-backend-prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-musicvideo}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3000:3000"
    volumes:
      - output_data_prod:/app/output
      - storage_data_prod:/app/storage
      - logs_data_prod:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net_prod

volumes:
  postgres_data_prod:
  redis_data_prod:
  output_data_prod:
  storage_data_prod:
  logs_data_prod:

networks:
  app_net_prod:
    driver: bridge
