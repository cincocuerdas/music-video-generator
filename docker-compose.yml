version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: pgvector/pgvector:pg15
    container_name: musicvideo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: musicvideo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis para BullMQ (colas de trabajo)
  redis:
    image: redis:7-alpine
    container_name: musicvideo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
